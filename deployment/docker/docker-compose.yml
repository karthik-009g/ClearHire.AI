version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: job_automation_db
    environment:
      POSTGRES_USER: job_user
      POSTGRES_PASSWORD: job_password_secure
      POSTGRES_DB: job_automation
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U job_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - job_automation_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: job_automation_cache
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - job_automation_network

  # FastAPI Backend
  backend:
    build:
      context: ..
      dockerfile: deployment/docker/Dockerfile
    container_name: job_automation_backend
    environment:
      DATABASE_URL: postgresql://job_user:job_password_secure@postgres:5432/job_automation
      REDIS_URL: redis://redis:6379/0
      DEBUG: "true"
      ENVIRONMENT: development
      # Add your API keys below
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-sk-ant-your-key-here}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - job_automation_network

  # Frontend React/Next.js
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: job_automation_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
      NEXT_PUBLIC_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ../frontend:/app
      - /app/node_modules
    networks:
      - job_automation_network

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: job_automation_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - job_automation_network

volumes:
  postgres_data:
    driver: local

networks:
  job_automation_network:
    driver: bridge
